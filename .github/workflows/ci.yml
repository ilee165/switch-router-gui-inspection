# CI — runs on every push and pull request to main.
#
# What it checks:
#   1. Syntax check  — py_compile parses every .py file without running it.
#                      Catches typos, bad indentation, and syntax errors before
#                      anyone pulls broken code.
#   2. Import check  — imports the non-GUI modules (db, connector) to verify
#                      that runtime imports and top-level logic work.
#                      GUI modules (PyQt6) are skipped here because they need a
#                      display — py_compile already covers their syntax.
#
# Runs on both Ubuntu and Windows so platform differences surface early.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # run all matrix combinations even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # py_compile compiles each file to bytecode to check for syntax errors.
      # It does NOT execute the code, so PyQt6 doesn't need a display.
      - name: Syntax check — root modules
        shell: bash
        run: |
          python -m py_compile \
            main.py \
            db.py \
            connector.py \
            device_manager.py \
            user_manager.py \
            styles.py

      - name: Syntax check — panels
        shell: bash
        run: |
          python -m py_compile \
            panels/__init__.py \
            panels/base.py \
            panels/interfaces.py \
            panels/routing.py \
            panels/bgp_ospf.py \
            panels/arp_mac.py \
            panels/cli.py

      # Full import of db and connector — these have no GUI dependency and
      # exercise top-level code paths (PLATFORM_MAP, GENIE_AVAILABLE flag, etc.)
      - name: Import check — non-GUI modules
        run: python -c "import db; import connector; print('Imports OK')"
